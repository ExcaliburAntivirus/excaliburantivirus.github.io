<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cadastrar</title>
</head>
<body>
    <div class="centro">
        <div class="tela-login">
        <h1>Cadastrar</h1>
    <form id="form-cadastro">
        <label for="username">Usuário:</label>
        <input type="text" id="username" name="username" placeholder="nome do usuário" required><br><br>
        <label for="password">Senha:</label>
        <input type="password" id="password" name="password" placeholder="senha" required><br><br>
        <input type="submit" value="Cadastrar">
    </form>
    <p>Já tem uma conta? <a href="login.html"><strong>Faça login aqui</strong></a></p>
    </div>
    </div>
    <script>
document.getElementById("form-cadastro").addEventListener("submit", function(e) {
    e.preventDefault(); // impede envio real

    const username = document.getElementById("username").value;

    // salva no navegador
    localStorage.setItem("usuario", username);

    // redireciona pro index
    window.location.href = "index.html";
});
</script>
</body>
</html>
